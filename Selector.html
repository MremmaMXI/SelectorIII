<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Selector de Hoteles</title>

  <!-- Tipografía -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --panel-width: 1000px;
      --muted: #f2f2f2;
      --card-radius: 14px;

      --accent: #da5161;

      --mar-accent: #da5161;
      --lindo-accent: #2AA59E;
      --joia-accent: #214788;

      --hotel-r: 218;
      --hotel-g: 81;
      --hotel-b: 97;

      --text: #111111;
      --muted-text: #111111;

      --panel-bg-light: rgba(255, 255, 255, 0.706);
      --panel-bg-dark: rgba(18, 18, 20, 0.6);

      --glass-blur: 15px;
      --filter-hover: rgba(0,0,0,0.06);
    }

    html,body{
      height:100%;
      margin:0;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      color:var(--text);
      overflow-x: hidden;
      overflow-y: auto;
    }
    * { box-sizing: border-box; }

    body, .group-title, .group-header, .filter-btn, .type-toggle .label, .sort-wrap label, #resultsInfo, .empty-state, .card-title, .card-price, .lang-badge {
      color: var(--text);
    }

    /* BACKGROUND SLIDER (HTML + CSS, sin depender de carga JS) */
    .bg-slider {
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      overflow: hidden;
      background-color: hwb(214 12% 79% / 0.604);
    }
    .bg-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 1000ms ease;
      will-change: opacity, transform;
      transform-origin: center center;
      background-color: #0f141b; /* fallback local */
    }
    @keyframes ken { from { transform: scale(1.05); } to { transform: scale(1.00); } }
    .bg-slide.active { opacity: 1; animation: ken 8s ease-in-out infinite alternate; }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      backdrop-filter: blur(5px) saturate(1.02);
      -webkit-backdrop-filter: blur(5px) saturate(1.02);
      mask-image: none;
      -webkit-mask-image: none;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0) 30%, rgba(0,0,0,0.12) 80%);
      z-index:0;
    }
    body.modal-open::before{
      backdrop-filter: blur(28px) saturate(1.02);
      -webkit-backdrop-filter: blur(28px) saturate(1.02);
    }
    body.modal-open::after{
      content: "";
      position: fixed;
      inset:0;
      background: rgba(0, 0, 0, 0.362);
      z-index: -1;
    }

    .wrap {
      width:100%;
      min-height:100vh;
      height:auto;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:28px;
      position:relative;
      overflow-y:auto;
      z-index: 0;
    }

    .panel {
      width:var(--panel-width);
      max-width:96%;
      height:78vh;
      max-height:92vh;
      min-height:340px;
      background: var(--panel-bg-light);
      border-radius:18px;
      box-shadow: 0 28px 72px rgba(0,0,0,0.38);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      position:relative;
      border:1px solid rgba(0,0,0,0.06);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      z-index: 100;
      transition: filter .28s ease, transform .28s ease;
    }

    .panel.blurred { filter: blur(7px) saturate(.98) grayscale(.02); transform: scale(.997); }

    .panel::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--hotel-r), var(--hotel-g), var(--hotel-b), 0.14) 0%, rgba(var(--hotel-r), var(--hotel-g), var(--hotel-b), 0.06) 50%, transparent 70%);
      pointer-events: none;
      z-index: -1;
      transition: background 0.4s ease;
    }

    .panel::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 680px;
      height: 680px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--hotel-r), var(--hotel-g), var(--hotel-b), 0.22) 0%, rgba(var(--hotel-r), var(--hotel-g), var(--hotel-b), 0.10) 40%, rgba(var(--hotel-r), var(--hotel-g), var(--hotel-b), 0.03) 65%, transparent 78%);
      pointer-events: none;
      z-index: -1;
      transition: background 0.4s ease;
    }

    body.dark .panel::before {
      background: radial-gradient(circle, rgba(var(--hotel-r), var(--hotel-g), var(--hotel-b), 0.18) 0%, rgba(var(--hotel-r), var(--hotel-g), var(--hotel-b), 0.07) 50%, transparent 70%);
    }
    body.dark .panel::after {
      background: radial-gradient(circle, rgba(var(--hotel-r), var(--hotel-g), var(--hotel-b), 0.28) 0%, rgba(var(--hotel-r), var(--hotel-g), var(--hotel-b), 0.13) 40%, rgba(var(--hotel-r), var(--hotel-g), var(--hotel-b), 0.04) 65%, transparent 78%);
    }

    /* ===== LAYOUT CONTROLS ===== */
    .layout-controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 200;
      align-self: center;
      flex-shrink: 0;
      margin-left: 10px;
    }

    .layout-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: #eaeaea;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 18px;
      font-weight: 700;
      outline: none;
      position: relative;
      overflow: hidden;
      transition: all 300ms cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow:
        0 10px 20px -4px rgba(0,0,0,0.4),
        inset 0 -3px 4px -1px rgba(0,0,0,0.15),
        0 -6px 10px -1px rgba(255,255,255,0.7),
        inset 0 3px 4px -1px rgba(255,255,255,0.25),
        inset 0 0 5px 1px rgba(255,255,255,0.7),
        inset 0 12px 20px 0 rgba(255,255,255,0.2);
    }

    .layout-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(var(--hotel-r), var(--hotel-g), var(--hotel-b), 0.14) 0%, rgba(var(--hotel-r), var(--hotel-g), var(--hotel-b), 0.06) 40%, transparent 55%);
      opacity: 0;
      transition: opacity .15s ease;
      pointer-events: none;
      border-radius: inherit;
    }
    body.dark .layout-btn::before {
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.06) 40%, transparent 55%);
    }

    .layout-btn:hover::before { opacity: 1; }

    .layout-btn:hover {
      transform: translateY(-3px);
      box-shadow:
        0 14px 26px -4px rgba(0,0,0,0.45),
        inset 0 -3px 4px -1px rgba(0,0,0,0.15),
        0 -6px 10px -1px rgba(255,255,255,0.7),
        inset 0 3px 4px -1px rgba(255,255,255,0.25),
        inset 0 0 5px 1px rgba(255,255,255,0.7),
        inset 0 12px 20px 0 rgba(255,255,255,0.2);
    }

    .layout-btn:active {
      transform: translateY(0) scale(0.94);
      box-shadow:
        0 6px 14px -4px rgba(0,0,0,0.35),
        inset 0 -6px 20px 1px rgba(255,255,255,0.8),
        0 -6px 10px -1px rgba(255,255,255,0.6),
        inset 0 6px 18px 0 rgba(0,0,0,0.3),
        inset 0 0 8px 1px rgba(255,255,255,0.5);
    }

    .layout-btn.active {
      box-shadow:
        0 6px 14px -4px rgba(0,0,0,0.35),
        inset 0 -6px 20px 1px rgba(255,255,255,0.8),
        0 -6px 10px -1px rgba(255,255,255,0.6),
        inset 0 6px 18px 0 rgba(0,0,0,0.25),
        inset 0 0 8px 1px rgba(255,255,255,0.5);
      color: #6366f1;
    }

    body.dark .layout-btn {
      background: #2a2a3a;
      color: #e0e0ff;
      border-color: transparent;
      box-shadow:
        0 10px 20px -4px rgba(0,0,0,0.65),
        inset 0 -3px 4px -1px rgba(0,0,0,0.35),
        0 -6px 10px -1px rgba(80,80,110,0.25),
        inset 0 3px 4px -1px rgba(80,80,110,0.2),
        inset 0 0 5px 1px rgba(80,80,110,0.25),
        inset 0 12px 20px 0 rgba(80,80,110,0.1);
    }

    body.dark .layout-btn:hover {
      transform: translateY(-3px);
      box-shadow:
        0 14px 26px -4px rgba(0,0,0,0.7),
        inset 0 -3px 4px -1px rgba(0,0,0,0.35),
        0 -6px 10px -1px rgba(80,80,110,0.25),
        inset 0 3px 4px -1px rgba(80,80,110,0.2),
        inset 0 0 5px 1px rgba(80,80,110,0.25),
        inset 0 12px 20px 0 rgba(80,80,110,0.1);
    }

    body.dark .layout-btn:active {
      transform: scale(0.94);
      box-shadow:
        0 6px 14px -4px rgba(0,0,0,0.6),
        inset 0 -6px 20px 1px rgba(80,80,110,0.4),
        0 -6px 10px -1px rgba(80,80,110,0.2),
        inset 0 6px 18px 0 rgba(0,0,0,0.5),
        inset 0 0 8px 1px rgba(80,80,110,0.3);
    }

    body.dark .layout-btn.active {
      box-shadow:
        0 6px 14px -4px rgba(0,0,0,0.6),
        inset 0 -6px 20px 1px rgba(80,80,110,0.4),
        0 -6px 10px -1px rgba(80,80,110,0.2),
        inset 0 6px 18px 0 rgba(0,0,0,0.45),
        inset 0 0 8px 1px rgba(80,80,110,0.3);
      color: #a5b4fc;
    }

    .zoom-value {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 28px;
      border-radius: 14px;
      background: #eaeaea;
      border: none;
      color: #333;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.01em;
      pointer-events: none;
      user-select: none;
      box-shadow:
        inset 2px 4px 8px rgba(0,0,0,0.12),
        inset -2px -2px 6px rgba(255,255,255,0.8);
    }

    body.dark .zoom-value {
      background: #2a2a3a;
      color: #e0e0ff;
      border-color: transparent;
      box-shadow:
        inset 2px 4px 8px rgba(0,0,0,0.4),
        inset -2px -2px 6px rgba(80,80,110,0.2);
    }

    #mainPanel {
      transition: zoom .25s ease;
    }

    /* ===== FULL-SCREEN LAYOUT MODE ===== */
    body.layout-full .wrap {
      padding: 14px;
      align-items: stretch;
    }

    body.layout-full .panel {
      width: min(1600px, 98vw);
      max-width: 98vw;
      height: 92vh;
      max-height: 96vh;
      min-height: unset;
      flex: 1;
    }

    body.layout-full .layout-controls {
      align-self: center;
    }

    body.layout-full .filters {
      max-height: none;
    }

    body.layout-full .message-generator {
      max-height: none;
    }

    /* ===== RESPONSIVE: small screens ===== */
    @media (max-width: 900px) {
      .layout-controls {
        flex-direction: row;
        margin-left: 0;
        margin-top: 10px;
        justify-content: center;
      }

      .wrap {
        flex-direction: column;
        align-items: center;
      }
    }

    body.dark { color: #ffffff; }
    body.dark .panel {
      background: var(--panel-bg-dark);
      border:1px solid rgba(255,255,255,0.06);
      box-shadow: 0 28px 72px rgba(0,0,0,0.6);
    }

    .site-title {
      position:absolute;
      top:-42px;
      left:50%;
      transform:translateX(-50%);
      z-index:2200;
      text-align:center;
      color:#fff;
      pointer-events:none;
      text-shadow: 0 8px 28px rgba(0,0,0,0.55);
      width:100%;
      max-width:var(--panel-width);
      font-smoothing:antialiased;
    }
    .site-title .line1 { font-weight:600; font-size:18px; letter-spacing:0.6px; margin:0; font-family:"Inter", system-ui; color:#fff; }
    .site-title .line2 { font-weight:400; font-size:12px; opacity:0.95; margin-top:2px; font-style:italic; color:#fff; }

    .header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 14px;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      box-shadow: 0 2px 16px rgba(0,0,0,0.07), 0 1px 0 rgba(0,0,0,0.04);
      position:relative;
      z-index:120;
    }
    body.dark .header {
      background: rgba(18,18,24,0.82);
      backdrop-filter: blur(18px) saturate(1.2);
      -webkit-backdrop-filter: blur(18px) saturate(1.2);
      box-shadow: 0 2px 16px rgba(0,0,0,0.28), 0 1px 0 rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .header-left { display:flex; align-items:center; gap:10px; }

    .star-logo {
      width:36px; height:36px; border-radius:8px; overflow:visible; display:flex; align-items:center; justify-content:center;
      display:inline-flex;
    }
    .star-logo img { width:28px; height:28px; display:block; object-fit:contain; transition: filter .5s ease, opacity .5s ease; }

    .hotel-segment { display:inline-flex; gap:8px; align-items:center; }
    .hotel-segment .hotel-btn {
      background:transparent; border:none; padding:8px 14px; border-radius:94px; cursor:pointer; font-weight:600;
      transition: transform .22s cubic-bezier(.4,0,.2,1), background .18s cubic-bezier(.4,0,.2,1), color .18s cubic-bezier(.4,0,.2,1), box-shadow .22s cubic-bezier(.4,0,.2,1);
      color:var(--text);
      font-size:14px;
      position:relative;
      overflow:hidden;
    }
    .hotel-segment .hotel-btn:hover {
      transform: translateY(-3px);
      border-radius: 94px;
      background: rgba(0,0,0,0.04);
      box-shadow: 0 10px 24px rgba(0,0,0,0.10);
    }
    .hotel-segment .hotel-btn:active {
      transform: scale(0.94);
      border-radius: 94px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .hotel-segment .hotel-btn.active { transform:translateY(-2px); color:#fff; background:var(--accent); border-radius:94px; }
    .hotel-segment .hotel-btn[data-key="mar"].active {
      background: #da5161;
      box-shadow: 0 4px 14px rgba(218, 81, 97, 0.45), 0 2px 6px rgba(218, 81, 97, 0.25);
    }
    .hotel-segment .hotel-btn[data-key="lindo"].active {
      background: #2AA59E;
      box-shadow: 0 4px 14px rgba(42, 165, 158, 0.45), 0 2px 6px rgba(42, 165, 158, 0.25);
    }
    .hotel-segment .hotel-btn[data-key="joia"].active {
      background: #214788;
      color: #fff;
      box-shadow: 0 4px 14px rgba(33, 71, 136, 0.45), 0 2px 6px rgba(33, 71, 136, 0.25);
    }
    body.dark .hotel-segment .hotel-btn[data-key="joia"].active {
      background: #f2deba;
      color: #1a1a1a;
      box-shadow: 0 4px 14px rgba(242, 222, 186, 0.45), 0 2px 6px rgba(242, 222, 186, 0.25);
    }

    .header-right { display:flex; align-items:center; gap:12px; }

    .mode-toggle {
      display: inline-grid;
      place-items: center;
      position: relative;
      height: 52px;
      width: 52px;
      cursor: pointer;
      border: none;
      background: #eaeaea;
      border-radius: 50%;
      box-shadow: 0 15px 25px -4px rgba(0,0,0,0.5),
                  inset 0 -3px 4px -1px rgba(0,0,0,0.2),
                  0 -10px 15px -1px rgba(255,255,255,0.6),
                  inset 0 3px 4px -1px rgba(255,255,255,0.2),
                  inset 0 0 5px 1px rgba(255,255,255,0.8),
                  inset 0 20px 30px 0 rgba(255,255,255,0.2);
      transition: all 300ms cubic-bezier(0.23, 1, 0.32, 1);
      overflow: visible;
    }
    .mode-toggle:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 30px -4px rgba(0,0,0,0.55),
                  inset 0 -3px 4px -1px rgba(0,0,0,0.2),
                  0 -10px 15px -1px rgba(255,255,255,0.6),
                  inset 0 3px 4px -1px rgba(255,255,255,0.2),
                  inset 0 0 5px 1px rgba(255,255,255,0.8),
                  inset 0 20px 30px 0 rgba(255,255,255,0.2);
    }
    body.dark .mode-toggle:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 30px -4px rgba(0,0,0,0.75),
                  inset 0 -3px 4px -1px rgba(0,0,0,0.4),
                  0 -10px 15px -1px rgba(80,80,100,0.3),
                  inset 0 3px 4px -1px rgba(80,80,100,0.2),
                  inset 0 0 5px 1px rgba(80,80,100,0.3),
                  inset 0 20px 30px 0 rgba(80,80,100,0.1);
    }
    .mode-toggle:active {
      transform: translateY(0) scale(0.95);
      box-shadow: 0 12px 25px -4px rgba(0,0,0,0.4),
                  inset 0 -8px 30px 1px rgba(255,255,255,0.9),
                  0 -10px 15px -1px rgba(255,255,255,0.6),
                  inset 0 8px 25px 0 rgba(0,0,0,0.4),
                  inset 0 0 10px 1px rgba(255,255,255,0.6);
    }
    body.dark .mode-toggle {
      background: #2a2a3a;
      color: #fff;
      box-shadow: 0 15px 25px -4px rgba(0,0,0,0.7),
                  inset 0 -3px 4px -1px rgba(0,0,0,0.4),
                  0 -10px 15px -1px rgba(80,80,100,0.3),
                  inset 0 3px 4px -1px rgba(80,80,100,0.2),
                  inset 0 0 5px 1px rgba(80,80,100,0.3),
                  inset 0 20px 30px 0 rgba(80,80,100,0.1);
    }
    body.dark .mode-toggle:active {
      transform: scale(0.95);
      box-shadow: 0 10px 25px -4px rgba(0,0,0,0.6),
                  inset 0 -8px 25px -1px rgba(80,80,100,0.5),
                  0 -10px 15px -1px rgba(80,80,100,0.3),
                  inset 0 8px 20px 0 rgba(0,0,0,0.4),
                  inset 0 0 5px 1px rgba(80,80,100,0.3);
    }
    .mode-toggle .icon {
      width:20px;height:20px;color:var(--text);
      display:inline-block;
      position:relative;
      z-index: 1;
    }
    .mode-toggle:focus { outline: 2px solid rgba(0,0,0,0.08); outline-offset:2px; }
    body.dark .mode-toggle .icon { color:#fff; }

    /* Icon cross-fade */
    #sunIcon, #moonIcon {
      position: absolute;
      top: 0; left: 0;
      transition: opacity 220ms ease;
    }

    .body {
      display: flex;
      gap: 16px;
      padding: 14px;
      flex: 1;
      overflow: hidden;
      position: relative;
      align-items: stretch;
      min-height: 0;
    }
    .filters { width:300px; min-width:220px; display:flex; flex-direction:column; gap:12px; align-items:stretch; z-index:110;
      overflow-y:auto;
      overflow-x:hidden;
      padding-right:6px;
      min-height:0;
    }

    .group { border-radius:10px; background:rgba(255,255,255,0.02); border:1px solid rgba(0,0,0,0.04); overflow:visible; }
    .group-header { padding:10px 12px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; user-select:none; color:var(--text); position:relative; overflow:hidden; }
    .group-title { font-weight:700; font-size:13px; margin:0; color:var(--text); letter-spacing:0.5px; }
    .group-body { padding:10px 12px; display:flex; gap:8px; flex-wrap:wrap; border-top:1px solid rgba(0,0,0,0.03); transition:max-height .22s ease, opacity .22s ease; max-height:1000px; opacity:1; overflow:auto; }
    .group.collapsed .group-body { max-height:0; opacity:0; padding-top:0; overflow:hidden; }

    .filter-btn { padding:8px 12px; border-radius:999px; background:var(--muted); border:1px solid rgba(0,0,0,0.06); cursor:pointer; font-weight:600; font-size:13px; color:var(--text);
      transition: background .12s ease, transform .08s ease, box-shadow .12s ease;
      position:relative; overflow:hidden;
    }
    .filter-btn:hover { transform: translateY(-3px); background: var(--filter-hover); box-shadow: 0 8px 18px rgba(0,0,0,0.06); }
    .filter-btn.active { background: var(--accent); color:#fff; box-shadow: 0 8px 20px rgba(0,0,0,0.12); border: none; }

    .filter-btn.disabled {
      opacity: 0.42;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
      background: transparent !important;
      color: var(--text) !important;
      border-color: rgba(0,0,0,0.04) !important;
    }
    body.dark .filter-btn.disabled {
      color: #fff !important;
      border-color: rgba(255,255,255,0.03) !important;
    }

    body.dark .group { background: rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.04); }
    body.dark .group-title { color: #fff; }
    body.dark .group-header { color:#fff; }
    body.dark .filter-btn {
      background: rgba(0,0,0,0.45);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.04);
    }

/* ===== JOIA DIET TOGGLE ===== */
.joia-diet-toggle-wrap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  user-select: none;
}

.joia-diet-toggle {
  position: relative;
  display: inline-flex;
  align-items: center;
  width: 140px;
  height: 34px;
  border-radius: 34px;
  cursor: pointer;
  overflow: hidden;
  flex-shrink: 0;
  /* Default: ESTÁNDAR (aqua) */
  background: linear-gradient(135deg, #2AA59E, #1d8c86);
  box-shadow: 0 4px 14px rgba(42, 165, 158, 0.45), 0 2px 6px rgba(42, 165, 158, 0.25);
  transition: background 0.38s ease, box-shadow 0.38s ease;
  transform: none !important;
}

.joia-diet-toggle-state {
  display: none;
}

/* When checked = VEGETARIANO (green) */
.joia-diet-toggle:has(.joia-diet-toggle-state:checked) {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  box-shadow: 0 4px 14px rgba(34, 197, 94, 0.45), 0 2px 6px rgba(34, 197, 94, 0.25);
}

/* White knob */
.joia-diet-toggle-knob {
  position: absolute;
  top: 4px;
  left: 4px;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.95);
  box-shadow: 0 2px 6px rgba(0,0,0,0.20);
  transition: left 0.38s cubic-bezier(0.68, -0.55, 0.27, 1.55);
  z-index: 2;
  pointer-events: none;
  flex-shrink: 0;
}

/* When checked: knob moves right */
.joia-diet-toggle:has(.joia-diet-toggle-state:checked) .joia-diet-toggle-knob {
  left: calc(100% - 30px);
}

/* Text label inside pill */
.joia-diet-toggle-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.95);
  text-shadow: 0 1px 3px rgba(0,0,0,0.15);
  pointer-events: none;
  z-index: 3;
  transition: opacity 0.25s ease;
  /* nudge text away from knob — default ESTÁNDAR: knob on left, text nudges right */
  padding-left: 22px;
}

/* When checked (VEGETARIANO): text nudges left (away from knob on right) */
.joia-diet-toggle:has(.joia-diet-toggle-state:checked) .joia-diet-toggle-text {
  padding-left: 0;
  padding-right: 22px;
}

/* ===== DEGRADADO DE SCROLL EN MODALES DE MENÚ ===== */
.menu-scroll-fade-wrap {
  position: relative;
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}

.menu-scroll-fade-wrap::before,
.menu-scroll-fade-wrap::after {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  height: 100px;
  pointer-events: none;
  z-index: 10;
  transition: opacity 0.3s ease;
}

.menu-scroll-fade-wrap::before {
  top: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.72) 0%,
    rgba(0,0,0,0.45) 30%,
    rgba(0,0,0,0.15) 65%,
    transparent 100%
  );
  opacity: 0;
}

.menu-scroll-fade-wrap::after {
  bottom: 0;
  background: linear-gradient(
    to top,
    rgba(0,0,0,0.72) 0%,
    rgba(0,0,0,0.45) 30%,
    rgba(0,0,0,0.15) 65%,
    transparent 100%
  );
  opacity: 1;
}

.menu-scroll-fade-wrap.fade-top::before    { opacity: 1; }
.menu-scroll-fade-wrap.fade-top::after     { opacity: 1; }
.menu-scroll-fade-wrap.fade-bottom-only::before { opacity: 0; }
.menu-scroll-fade-wrap.fade-bottom-only::after  { opacity: 1; }
.menu-scroll-fade-wrap.fade-top-only::before    { opacity: 1; }
.menu-scroll-fade-wrap.fade-top-only::after     { opacity: 0; }
.menu-scroll-fade-wrap.fade-none::before   { opacity: 0; }
.menu-scroll-fade-wrap.fade-none::after    { opacity: 0; }

/* Botón toggle */
#toggleMsgGen {
  position: absolute;
  right: -14px;
  top: 50%;
  transform: translateY(-50%);
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: #eaeaea;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: #333;
  z-index: 120;
  flex-shrink: 0;
  transition: all 300ms cubic-bezier(0.23, 1, 0.32, 1);
  box-shadow:
    0 10px 20px -4px rgba(0,0,0,0.4),
    inset 0 -3px 4px -1px rgba(0,0,0,0.15),
    0 -6px 10px -1px rgba(255,255,255,0.7),
    inset 0 3px 4px -1px rgba(255,255,255,0.25),
    inset 0 0 5px 1px rgba(255,255,255,0.7),
    inset 0 12px 20px 0 rgba(255,255,255,0.2);
}

#toggleMsgGen:hover {
  transform: translateY(calc(-50% - 3px));
  box-shadow:
    0 14px 26px -4px rgba(0,0,0,0.45),
    inset 0 -3px 4px -1px rgba(0,0,0,0.15),
    0 -6px 10px -1px rgba(255,255,255,0.7),
    inset 0 3px 4px -1px rgba(255,255,255,0.25),
    inset 0 0 5px 1px rgba(255,255,255,0.7),
    inset 0 12px 20px 0 rgba(255,255,255,0.2);
}

#toggleMsgGen:active {
  transform: translateY(-50%) scale(0.94);
  box-shadow:
    0 6px 14px -4px rgba(0,0,0,0.35),
    inset 0 -6px 20px 1px rgba(255,255,255,0.8),
    0 -6px 10px -1px rgba(255,255,255,0.6),
    inset 0 6px 18px 0 rgba(0,0,0,0.3),
    inset 0 0 8px 1px rgba(255,255,255,0.5);
}

body.dark #toggleMsgGen {

  color: #e0e0ff;
  box-shadow:
    0 10px 20px -4px rgba(0,0,0,0.65),

    0 -6px 10px -1px rgba(80,80,110,0.25),
    inset 0 3px 4px -1px rgba(80,80,110,0.2),
    inset 0 0 5px 1px rgba(80,80,110,0.25),
    inset 0 12px 20px 0 rgba(80,80,110,0.1);

/* Tooltip personalizado del botón toggle */
.toggle-tooltip {
  position: absolute;

  top: 50%;
  transform: translateY(-50%);
  background: rgba(20,20,30,0.92);
  color: #fff;

/* ===== CARD SPINNER (bolitas orbitando) ===== */
.card-spinner {
  position: absolute;
  inset: 0;
  z-index: 3;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--card-radius);
  pointer-events: none;
  transition: opacity 0.35s ease;
}
.card-spinner.loaded {
  opacity: 0;
}
.card-spinner .dot {
  width: 7px;
  height: 7px;
  background: rgba(255, 255, 255, 0.80);
  border-radius: 50%;
  position: absolute;
  animation: card-orbit 1.1s ease-in-out infinite;
}
.card-spinner .dot:nth-child(1) { animation-delay: 0s; }
.card-spinner .dot:nth-child(2) { animation-delay: 0.22s; }
.card-spinner .dot:nth-child(3) { animation-delay: 0.44s; }

@keyframes card-orbit {
  0%   { transform: translate(-13px,  0px); opacity: 0.35; }
  33%  { transform: translate(  0px,-13px); opacity: 1;    }
  66%  { transform: translate( 13px,  0px); opacity: 0.35; }
  100% { transform: translate(-13px,  0px); opacity: 0.35; }
}
.modal-spinner {
  border-radius: 12px;
  background: rgba(0,0,0,0.18);
}

/* ===== POPUP ANIMATION para imágenes en modal ===== */
@keyframes popIn {
  0%   { transform: scale(0.60) translateY(24px); opacity: 0; }
  65%  { transform: scale(1.04) translateY(-4px); opacity: 1; }
  100% { transform: scale(1)    translateY(0px);  opacity: 1; }
}
.modal .menu-image,
.modal .card .menu-image {
  animation: popIn 0.42s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  animation-play-state: paused;
}

/* ===== GLOBAL TOOLTIP (igual a .toggle-tooltip) ===== */
.ui-tooltip {
  position: fixed;
  transform: translateX(-50%) scale(0.88);
  transform-origin: center bottom;
  background: rgba(20,20,30,0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: #fff;
  font-size: 11px;

  padding: 5px 10px;
  border-radius: 8px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 9999;

  transition: opacity 0.18s ease, transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 4px 14px rgba(0,0,0,0.28);
  letter-spacing: 0.01em;
}

.ui-tooltip.visible {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}

/* === SPOTLIGHT HOVER EFFECT: all interactive elements === */
.hotel-btn::before, .filter-btn::before, .type-toggle::before,
.group-header::before, .mode-toggle::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(var(--hotel-r), var(--hotel-g), var(--hotel-b), 0.14) 0%, rgba(var(--hotel-r), var(--hotel-g), var(--hotel-b), 0.06) 40%, transparent 55%);
  opacity: 0;
  transition: opacity .15s ease;
  pointer-events: none;
  border-radius: inherit;
}
/* clip the spotlight on the circular mode-toggle so it stays inside the circle */
.mode-toggle::before {
  clip-path: circle(50% at 50% 50%);
}
.hotel-btn:hover::before, .filter-btn:hover::before, .type-toggle:hover::before,
.group-header:hover::before, .mode-toggle:hover::before {
  opacity: 1;
}
body.dark .hotel-btn::before,
body.dark .filter-btn::before,
body.dark .type-toggle::before,
body.dark .group-header::before,
body.dark .mode-toggle::before {
  background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.06) 40%, transparent 55%);
}

/* Make sure text/icons stay above the spotlight layer */
.hotel-btn > *, .filter-btn > *, .type-toggle > *,
.group-header > *, .mode-toggle > * {
  position: relative;
  z-index: 1;
}

/* === ENV SLIDERS (darkness + blur controls) === */
.env-slider-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.env-slider-icon {
  color: #fff;
  opacity: 0.7;
  flex-shrink: 0;
}
body.dark .env-slider-icon {
  color: #aaa;
}

.env-slider {
  -webkit-appearance: none;
  appearance: none;
  writing-mode: vertical-lr;
  direction: rtl;
  width: 4px;
  height: 80px;
  background: transparent;
  outline: none;
  cursor: pointer;
  padding: 0;
  margin: 0;
}

/* Track */
.env-slider::-webkit-slider-runnable-track {
  width: 5px;
  background: rgba(255,255,255,0.9);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.18);
  border-radius: 999px;

  box-shadow: 0 0 0 1px rgba(0,0,0,0.18);
  border-radius: 999px;
}
body.dark .env-slider::-moz-range-track {
  background: rgba(255,255,255,0.55);
  border-radius: 999px;
}

/* Thumb */
.env-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #eaeaea;
  cursor: pointer;
  margin-left: -7px;
  transition: transform 200ms cubic-bezier(0.23,1,0.32,1), box-shadow 200ms ease;
  box-shadow:
    0 4px 10px -2px rgba(0,0,0,0.35),
    inset 0 -1px 2px rgba(0,0,0,0.12),
    0 -3px 6px -1px rgba(255,255,255,0.65),
    inset 0 1px 2px rgba(255,255,255,0.25),
    inset 0 0 3px rgba(255,255,255,0.6);
}
.env-slider::-webkit-slider-thumb:hover {
  transform: scale(1.18);
  box-shadow:
    0 6px 14px -2px rgba(0,0,0,0.4),
    inset 0 -1px 2px rgba(0,0,0,0.12),
    0 -3px 6px -1px rgba(255,255,255,0.65),
    inset 0 1px 2px rgba(255,255,255,0.25),
    inset 0 0 3px rgba(255,255,255,0.6);
}

  transform: scale(0.94);
}

  box-shadow:

    0 4px 10px -2px rgba(0,0,0,0.6),
    inset 0 -1px 2px rgba(0,0,0,0.32),
    0 -3px 6px -1px rgba(80,80,110,0.2),
    inset 0 1px 2px rgba(80,80,110,0.18),
    inset 0 0 3px rgba(80,80,110,0.22);
}

.env-slider::-moz-range-thumb {

  box-shadow:

        const prev = slides[i];

    (function initLayoutMode() {
      const btnFull  = document.getElementById('btnLayoutFull');
      const btnFloat = document.getElementById('btnLayoutFloat');

      function enterFullscreen() {
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
        else if (el.msRequestFullscreen) el.msRequestFullscreen();
      }

      function exitFullscreen() {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
        else if (document.msExitFullscreen) document.msExitFullscreen();
      }

      function isFullscreen() {
        return !!(document.fullscreenElement || document.webkitFullscreenElement ||
                  document.mozFullScreenElement || document.msFullscreenElement);
      }

      function applyFullState(full) {
        if (full) {
          document.body.classList.add('layout-full');
          btnFull.classList.add('active');
          btnFull.setAttribute('aria-pressed', 'true');
          btnFloat.classList.remove('active');
          btnFloat.setAttribute('aria-pressed', 'false');
        } else {
          document.body.classList.remove('layout-full');
          btnFloat.classList.add('active');
          btnFloat.setAttribute('aria-pressed', 'true');
          btnFull.classList.remove('active');
          btnFull.setAttribute('aria-pressed', 'false');
        }
      }

      btnFull.addEventListener('click', function() {
        enterFullscreen();
        applyFullState(true);
      });

      btnFloat.addEventListener('click', function() {
        exitFullscreen();
        applyFullState(false);
      });

      // Sincronizar estado visual si el usuario sale con ESC o F11
      ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange'].forEach(function(evt) {
        document.addEventListener(evt, function() {
          applyFullState(isFullscreen());
        });
      });

      // Siempre iniciar en modo flotante al cargar
      applyFullState(false);
    })();

    (function initZoom() {
      const ZOOM_LEVELS = [25, 33, 50, 67, 75, 80, 90, 100, 110, 125, 150, 175, 200, 250, 300, 400, 500];
      const STORAGE_KEY = 'selector_zoom';
      const zoomTarget = document.querySelector('.body');
      const zoomValueEl = document.getElementById('zoomValue');
      const btnZoomIn  = document.getElementById('btnZoomIn');
      const btnZoomOut = document.getElementById('btnZoomOut');

      let currentZoom = 100;

      function setZoom(percent) {
        currentZoom = percent;
        const idx = ZOOM_LEVELS.indexOf(percent);
        zoomTarget.style.zoom = percent + '%';
        zoomValueEl.textContent = percent + '%';
        try { localStorage.setItem(STORAGE_KEY, String(percent)); } catch(e) {}
        btnZoomOut.disabled = (idx === 0);
        btnZoomIn.disabled  = (idx === ZOOM_LEVELS.length - 1);
      }

      function zoomIn() {
        const idx = ZOOM_LEVELS.indexOf(currentZoom);
        if (idx !== -1 && idx < ZOOM_LEVELS.length - 1) setZoom(ZOOM_LEVELS[idx + 1]);
      }

      function zoomOut() {
        const idx = ZOOM_LEVELS.indexOf(currentZoom);
        if (idx > 0) setZoom(ZOOM_LEVELS[idx - 1]);
      }

      btnZoomIn.addEventListener('click', zoomIn);
      btnZoomOut.addEventListener('click', zoomOut);

      // Restore persisted zoom
      let saved = 100;
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = parseInt(raw, 10);
          if (ZOOM_LEVELS.indexOf(parsed) !== -1) saved = parsed;
        }
      } catch(e) {}
      setZoom(saved);
    })();

    function toggleAll(group){
      if(group === 'packages'){
        const btns = Array.from(packageButtons.values()).filter(b => !b.classList.contains('disabled') && b.style.display !== 'none');
        const anySelected = btns.some(b => b.classList.contains('active'));
        if(!anySelected){
          btns.forEach(b => { b.classList.add('active'); b.setAttribute('aria-pressed','true'); state.packages.add(b.dataset.key); });
        } else {
          btns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-pressed','false'); state.packages.delete(b.dataset.key); });
        }
      } else {
        const btns = Array.from(placeButtons.values()).filter(b => !b.classList.contains('disabled') && b.style.display !== 'none');
        const anySelected = btns.some(b => b.classList.contains('active'));
        if(!anySelected){
          btns.forEach(b => { b.classList.add('active'); b.setAttribute('aria-pressed','true'); state.places.add(b.dataset.key); });
        } else {
          btns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-pressed','false'); state.places.delete(b.dataset.key); });
        }
      }
      updateEnabledFilters();
      updateResults();
      updateGroupHighlights();
    }

    function toggleFilter(group, key, btn){
      if(btn.classList.contains('disabled')) return;
      const s = state[group];
      if(s.has(key)){
        s.delete(key); btn.classList.remove('active'); btn.setAttribute('aria-pressed','false');
      } else {
        s.add(key); btn.classList.add('active'); btn.setAttribute('aria-pressed','true');
      }
      updateEnabledFilters();
      updateResults();
      updateGroupHighlights();
    }

    function updateEnabledFilters(){
      packageButtons.forEach(btn => {
        btn.classList.remove('disabled');
        btn.removeAttribute('aria-disabled');
        btn.disabled = false;
      });
      placeButtons.forEach(btn => {
        btn.classList.remove('disabled');
        btn.removeAttribute('aria-disabled');
        btn.disabled = false;
      });

      if(state.packages.size > 0){
        const allowedPlaces = new Set();
        state.packages.forEach(pkg => {
          const s = packagesToPlaces[pkg];
          if(s) s.forEach(p => allowedPlaces.add(p));
        });
        placeButtons.forEach((btn, key) => {
          if(!allowedPlaces.has(key)){
            if(btn.classList.contains('active')){
              btn.classList.remove('active');
              btn.setAttribute('aria-pressed','false');
              state.places.delete(key);
            }
            btn.classList.add('disabled');
            btn.setAttribute('aria-disabled','true');
            btn.disabled = true;
          }
        });
      }

      if(state.places.size > 0){
        const allowedPackages = new Set();
        state.places.forEach(pl => {
          const s = placesToPackages[pl];
          if(s) s.forEach(p => allowedPackages.add(p));
        });
        packageButtons.forEach((btn, key) => {
          if(!allowedPackages.has(key)){
            if(btn.classList.contains('active')){
              btn.classList.remove('active');
              btn.setAttribute('aria-pressed','false');
              state.packages.delete(key);
            }
            btn.classList.add('disabled');
            btn.setAttribute('aria-disabled','true');
            btn.disabled = true;
          }
        });
      }
    }

    function parsePriceValue(item){
      if(!item || !item.price) return 0;

    function updateResults(){
      if(activeHotel !== 'mar' && activeHotel !== 'lindo' && activeHotel !== 'joia'){
        resultsGrid.style.display = 'none';
        emptyState.style.display = 'flex';
        emptyState.textContent = 'No hay imágenes disponibles para este hotel (añadiré contenido más tarde).';
        resultsInfo.textContent = '';
        return;
      }

      if(state.packages.size === 0 && state.places.size === 0 && !state.searchQuery){
        resultsGrid.style.display = 'none';
        emptyState.style.display = 'flex';
        emptyState.textContent = 'Selecciona al menos un PAQUETE o un LUGAR para ver resultados';
        resultsInfo.textContent = '';
        return;
      }

      const activeHotelTag = HOTEL_TAG_MAP[activeHotel];

      const filtered = IMAGES.filter(item => {
        if(state.packages.size > 0){
          const ok = Array.from(state.packages).some(p => item.tags.includes(p));
          if(!ok) return false;
        }
        if(state.places.size > 0){
          const ok2 = Array.from(state.places).some(p => item.tags.includes(p));
          if(!ok2) return false;
        }
        if(activeHotelTag && !item.tags.includes(activeHotelTag)) return false;
        // Filtro de búsqueda por nombre
        if (state.searchQuery) {
          const q = state.searchQuery;
          if (!(item.title || '').toLowerCase().includes(q)) return false;
        }
        return true;
      });

      filtered.sort((a,b) => {
        const pa = parsePriceValue(a);
        const pb = parsePriceValue(b);
        return state.sortOrder === 'high' ? (pb - pa) : (pa - pb);
      });

      resultsGrid.innerHTML = '';
      if(filtered.length === 0){
        resultsGrid.style.display = 'none';
        emptyState.style.display = 'flex';
        emptyState.textContent = '0 resultados';
        resultsInfo.textContent = '0 resultados';
        return;
      }

      emptyState.style.display = 'none';
      resultsGrid.style.display = 'grid';
      resultsInfo.textContent = filtered.length + (filtered.length === 1 ? ' resultado' : ' resultados');

      const frag = document.createDocumentFragment();
      filtered.forEach(it => frag.appendChild(createGalleryCard(it)));
      resultsGrid.appendChild(frag);
      window._updateResultsFade && window._updateResultsFade();
    }

    async function tryAttachImageFileToDataTransfer(ev, imageUrl, suggestedName = 'image.jpg'){
      try {
        try { ev.dataTransfer.setData('text/plain', imageUrl); } catch(e){}
        try { ev.dataTransfer.setData('text/uri-list', imageUrl); } catch(e){}
        try { ev.dataTransfer.setData('text/html', `<img src="${imageUrl}" alt="">`); } catch(e){}

        const res = await fetch(imageUrl, { mode: 'cors' });
        if(!res.ok) throw new Error('fetch failed ' + res.status);
        const blob = await res.blob();
        const ext = (blob.type && blob.type.split('/')[1]) ? '.' + blob.type.split('/')[1] : '.jpg';
        const fileName = suggestedName.endsWith(ext) ? suggestedName : (suggestedName + ext);
        const file = new File([blob], fileName, { type: blob.type || 'image/jpeg' });

        if(ev.dataTransfer && ev.dataTransfer.items && typeof ev.dataTransfer.items.add === 'function'){
          try {
            ev.dataTransfer.items.add(file);
            try{ ev.dataTransfer.setData('DownloadURL', `${file.type}:${file.name}:${imageUrl}`); }catch(e){}
            return true;
          } catch(err) {
            console.warn('dataTransfer.items.add(file) falló:', err);
          }
        }
      } catch(err) {
        console.warn('No se pudo adjuntar File al drag (CORS/fetch/browser):', err);
      }
      return false;
    }

    function attachImageSpinner(img) {
      const wrap = img.parentElement;
      if (!wrap) return;
      const pos = getComputedStyle(wrap).position;
      if (pos === 'static') wrap.style.position = 'relative';

      const sp = document.createElement('div');
      sp.className = 'card-spinner modal-spinner';
      for (let i = 0; i < 3; i++) {
        const d = document.createElement('div');
        d.className = 'dot';
        sp.appendChild(d);
      }
      wrap.insertBefore(sp, img);

      img.style.opacity = '0';
      img.style.transition = 'opacity 0.35s ease';

      img.addEventListener('load', () => {
        sp.classList.add('loaded');
        img.style.opacity = '1';
        img.style.animationPlayState = 'running';
      }, { once: true });

      const origOnerror = img.onerror;
      img.onerror = function () {
        sp.classList.add('loaded');
        img.style.opacity = '1';
        if (origOnerror) origOnerror.call(this);
      };
    }

    function openZoomedImage(src, alt) {
      const zoomOverlay = document.createElement('div');
      zoomOverlay.className = 'img-zoom-overlay';
      zoomOverlay.id = 'imgZoomOverlay';

      const wrapper = document.createElement('div');
      wrapper.className = 'img-zoom-wrapper';

      const img = document.createElement('img');
      img.src = src;
      img.alt = alt || '';
      img.draggable = false;

      const closeBtn = document.createElement('button');
      closeBtn.className = 'img-zoom-close';
      closeBtn.innerHTML = '✕';
      closeBtn.title = 'Cerrar vista ampliada';
      closeBtn.setAttribute('aria-label', 'Cerrar vista ampliada');
      closeBtn.onclick = (e) => {
        e.stopPropagation();
        closeZoomedImage();
      };

      wrapper.appendChild(img);
      attachImageSpinner(img);
      wrapper.appendChild(closeBtn);
      zoomOverlay.appendChild(wrapper);

      zoomOverlay.addEventListener('click', (e) => {
        if (e.target === zoomOverlay) closeZoomedImage();
      });

      document.body.appendChild(zoomOverlay);

      function escHandler(e) {
        if (e.key === 'Escape') {
          closeZoomedImage();
          document.removeEventListener('keydown', escHandler);
        }
      }
      document.addEventListener('keydown', escHandler);
      zoomOverlay._escHandler = escHandler;
    }

    function closeZoomedImage() {
      const zoomOverlay = document.getElementById('imgZoomOverlay');
      if (zoomOverlay) {
        zoomOverlay._escHandler && document.removeEventListener('keydown', zoomOverlay._escHandler);
        zoomOverlay.style.opacity = '0';
        zoomOverlay.style.transition = 'opacity .2s ease';
        setTimeout(() => zoomOverlay.remove(), 200);
      }
    }

    function makeImageClickable(img, src, alt) {
      img.style.cursor = 'zoom-in';
      let mouseButtonDown = false;
      let dragStarted = false;

      img.addEventListener('mousedown', () => { mouseButtonDown = true; dragStarted = false; });
      img.addEventListener('mousemove', () => { if (mouseButtonDown) dragStarted = true; });
      img.addEventListener('mouseup', () => { mouseButtonDown = false; });
      img.addEventListener('click', (e) => {
        if (!dragStarted) {
          e.stopPropagation();
          openZoomedImage(src, alt);
        }
        dragStarted = false;
      });
    }

    function closeOverlay(){
      modal.classList.remove('show');
      overlay.classList.remove('show');
      overlay.setAttribute('aria-hidden','true');
      document.body.classList.remove('modal-open');
      mainPanel.classList.remove('blurred');
      if(overlay._escHandler){ document.removeEventListener('keydown', overlay._escHandler); overlay._escHandler = null; }
      setTimeout(()=> {
        overlay.style.display = 'none';
        modal.innerHTML = '';
      }, 280);
      if(overlay._previousFocus && typeof overlay._previousFocus.focus === 'function'){
        overlay._previousFocus.focus();
      }
      overlay._previousFocus = null;
    }

          lindo: 'brightness(0) saturate(100%) invert(50%) sepia(60%) saturate(500%) hue-rotate(152deg) brightness(95%)',  // → #2AA59E
          joia:  'brightness(0) saturate(100%) invert(20%) sepia(80%) saturate(700%) hue-rotate(200deg) brightness(80%)'   // → #214788
        };
        brandLogo.style.filter = filters[hotel] || 'none';
      }
    }

    function setMode(dark){
      if(dark){
        document.body.classList.add('dark');
        modeToggle.setAttribute('aria-pressed','true');
        sunIcon.style.opacity = '1';
        moonIcon.style.opacity = '0';
        document.documentElement.style.setProperty('--text', '#ffffff');
        document.documentElement.style.setProperty('--muted-text', '#ffffff');
      } else {
        document.body.classList.remove('dark');
        modeToggle.setAttribute('aria-pressed','false');
        sunIcon.style.opacity = '0';
        moonIcon.style.opacity = '1';
        document.documentElement.style.setProperty('--text', '#111111');
        document.documentElement.style.setProperty('--muted-text', '#111111');
      }
      // Re-apply hotel accent for JOIA which differs between light and dark
      if (activeHotel === 'joia') {
        setAccent(dark ? '#f2deba' : '#214788');
      }
      updateLogoFilter(activeHotel, dark);
      const rgb = getHotelRgb(activeHotel, dark);
      document.documentElement.style.setProperty('--hotel-r', rgb.r);
      document.documentElement.style.setProperty('--hotel-g', rgb.g);
      document.documentElement.style.setProperty('--hotel-b', rgb.b);

      let _spotlightRaf = null;

          const r = target.getBoundingClientRect();
          target.style.setProperty('--x', ((e.clientX - r.left) / r.width * 100) + '%');

    pt: {

      service: "Como seu representante de Guest Service, queremos informá-l{genderPTPronoun} que estamos à sua disposição 24 horas por dia, 7 dias por semana. Seja para uma solicitação especial para o seu quarto, informações sobre a região ou ajuda para fazer uma reserva para jantar, estamos sempre a seu serviço. Você pode nos contatar através deste chat no aplicativo Iberostar ou discando o ramal 0.",
      amenities: "Também gostaríamos de aproveitar esta oportunidade para compartilhar nossa maravilhosa lista de serviços. Desde jantares na praia até garrafas de boa escolha, oferecemos uma variedade de opções para tornar a sua celebração ainda mais especial.",

  const state = {
    lastName: '',
    gender: 'Mrs.',
    lang: 'en',
    hotel: 'Iberostar Selection Paraiso Maya',
    representative: 'Montserrat Rangel'
  };

  // Capitalizar apellido correctamente
  function capitalizeLastName(name) {
    if (!name) return '';
    return name
      .trim()
      .toLowerCase()
      .split(/(\s|-|')/)
      .map(part => {
        if (part === ' ' || part === '-' || part === "'") return part;
        return part.charAt(0).toUpperCase() + part.slice(1);
      })
      .join('');
  }

  // Generar mensaje
  function generateMessage() {
    const template = messages[state.lang];
    if (!template) return '';

    let genderES = state.gender === 'Mrs.' ? 'a' : 'o';
    let genderPrefix = state.gender === 'Mrs.' ? 'Sra' : 'Sr';
    let genderDE = state.gender === 'Mrs.' ? 'r' : 'r';
    let genderPrefixDE = state.gender === 'Mrs.' ? 'Frau' : 'Herr';
    let genderFR = state.gender === 'Mrs.' ? 'e' : '';
    let genderPrefixFR = state.gender === 'Mrs.' ? 'Madame' : 'Monsieur';
    let genderPT = state.gender === 'Mrs.' ? 'a' : 'o';
    let genderPrefixPT = state.gender === 'Mrs.' ? 'Sra.' : 'Sr.';
    let genderPTPronoun = state.gender === 'Mrs.' ? 'a' : 'o';

    let message = Object.values(template).join('\n\n');
    
    message = message
      .replace(/{gender}/g, state.gender)
      .replace(/{lastName}/g, state.lastName)
      .replace(/{hotel}/g, state.hotel)
      .replace(/{representative}/g, state.representative)
      .replace(/{genderES}/g, genderES)
      .replace(/{genderPrefix}/g, genderPrefix)
      .replace(/{genderDE}/g, genderDE)
      .replace(/{genderPrefixDE}/g, genderPrefixDE)
      .replace(/{genderFR}/g, genderFR)
      .replace(/{genderPrefixFR}/g, genderPrefixFR)
      .replace(/{genderPT}/g, genderPT)
      .replace(/{genderPrefixPT}/g, genderPrefixPT)
      .replace(/{genderPTPronoun}/g, genderPTPronoun);

    return message;
  }

  // Copiar mensaje
  function copyMessage() {
    const message = generateMessage();
    const btn = document.getElementById('copyMessageBtn');
    const defaultHTML = btn ? btn.innerHTML : '';
    if (btn) {
      const origEl = btn.querySelector('.copy-btn-content');
      btn._origContent = origEl ? origEl.innerHTML : btn.innerHTML;
    }
    function showSent() {
      if (!btn) return;
      const content = btn.querySelector('.copy-btn-content');

      // inject ripple
      const ripple = document.createElement('span');
      ripple.className = 'copy-ripple in';
      btn.appendChild(ripple);

      // after ripple covers button, show copiado text
      setTimeout(() => {
        if (content) { content.innerHTML = '✓ ¡Copiado!'; content.style.color = '#fff'; }
      }, 200);

      // start shrink
      setTimeout(() => {
        ripple.classList.remove('in');
        ripple.classList.add('out');
        if (content) { content.style.color = ''; content.innerHTML = btn._origContent || ''; }
      }, 1400);

      // full cleanup
      setTimeout(() => {
        ripple.remove();
        btn.innerHTML = defaultHTML;
      }, 1800);
    }
    navigator.clipboard.writeText(message).then(() => {
      showSent();
    }).catch(err => {
      console.error('Error al copiar:', err);
      // Fallback para navegadores antiguos
      const textarea = document.createElement('textarea');
      textarea.value = message;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showSent();
    });
  }

  // Mostrar alerta (desactivada — el botón ya tiene su animación propia)
  function showAlert() {}

  // Event listeners
  // ===== CARGAR REPRESENTANTES DINÁMICAMENTE =====
  function crearBotonRep(rep, container) {
    var btn = document.createElement('button');
    btn.className = 'msg-gen-btn msg-gen-btn-small';
    btn.setAttribute('data-rep', rep.nombre);
    btn.textContent = rep.etiqueta;
    btn.addEventListener('click', function() {
      container.querySelectorAll('[data-rep]').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      state.representative = btn.dataset.rep;
    });
    return btn;
  }

  function cargarRepresentantes() {
    var container = document.getElementById('representativeButtons');
    if (!container) return;

    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(function(reps) {
          container.innerHTML = '';
          if (!reps || reps.length === 0) {
            cargarRepresentantesFallback();
            return;
          }
          reps.forEach(function(rep) {
            container.appendChild(crearBotonRep(rep, container));
          });
        })
        .withFailureHandler(function(err) {
          console.warn('getRepresentantes falló, usando fallback:', err);
          cargarRepresentantesFallback();
        })
        .getRepresentantes();
    } else {

    const lastNameInput = document.getElementById('lastNameInput');
    const copyBtn = document.getElementById('copyMessageBtn');

    lastNameInput.addEventListener('input', (e) => {
      state.lastName = capitalizeLastName(e.target.value);
      e.target.value = state.lastName;
    });

    // Botones de género
    document.querySelectorAll('[data-gender]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-gender]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.gender = btn.dataset.gender;
      });
    });

    // Botones de idioma
    document.querySelectorAll('[data-lang]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-lang]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.lang = btn.dataset.lang;
      });

    // Botones de hotel
    document.querySelectorAll('[data-hotel]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-hotel]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.hotel = btn.dataset.hotel;

(function initMsgGenToggle() {
  const STORAGE_KEY = 'selector_msggen_open';
  const msgGen = document.getElementById('messageGenerator');
  const btn = document.getElementById('toggleMsgGen');
  if (!msgGen || !btn) return;

  // Leer estado guardado — por defecto CERRADO
  let isOpen = localStorage.getItem(STORAGE_KEY) === 'true';

  function setOpen(open) {
    isOpen = open;
    localStorage.setItem(STORAGE_KEY, String(open));
    const tooltip = document.getElementById('toggleMsgGenTooltip');
    if (open) {
      msgGen.classList.remove('msg-gen-collapsed');
      btn.classList.add('msg-gen-open');
      btn.setAttribute('aria-label', 'Cerrar Generador de Mensajes');
      btn.setAttribute('aria-expanded', 'true');
      if (tooltip) tooltip.textContent = 'Cerrar';
    } else {
      msgGen.classList.add('msg-gen-collapsed');
      btn.classList.remove('msg-gen-open');
      btn.setAttribute('aria-label', 'Abrir Generador de Mensajes');
      btn.setAttribute('aria-expanded', 'false');
      if (tooltip) tooltip.textContent = 'Abrir Generador de Mensajes';
    }
  }

  btn.addEventListener('click', () => setOpen(!isOpen));

  // Estado inicial
  setOpen(isOpen);
})();

// ===== ENV SLIDERS (oscuridad + blur del fondo) =====
(function initEnvSliders() {
  const darknessSlider = document.getElementById('bgDarknessSlider');
  const blurSlider = document.getElementById('bgBlurSlider');
  if (!darknessSlider || !blurSlider) return;

  // Crear elemento overlay de oscuridad si no existe
  let darknessOverlay = document.getElementById('bgDarknessOverlay');
  if (!darknessOverlay) {
    darknessOverlay = document.createElement('div');
    darknessOverlay.id = 'bgDarknessOverlay';
    darknessOverlay.style.cssText = 'position:fixed;inset:0;z-index:-2;pointer-events:none;background:rgba(0,0,0,0);transition:background 150ms ease;';
    document.body.appendChild(darknessOverlay);
  }

  function applyDarkness(val) {
    const alpha = (val / 100).toFixed(2);
    darknessOverlay.style.background = `rgba(6,39,51,${alpha})`;
  }

  function applyBlur(val) {
    let styleEl = document.getElementById('envBlurStyle');
    if (!styleEl) {
      styleEl = document.createElement('style');
      styleEl.id = 'envBlurStyle';
      document.head.appendChild(styleEl);
    }
    styleEl.textContent = `body::before { backdrop-filter: blur(${val}px) saturate(1.02) !important; -webkit-backdrop-filter: blur(${val}px) saturate(1.02) !important; }`;
  }

  darknessSlider.addEventListener('input', () => applyDarkness(darknessSlider.value));
  blurSlider.addEventListener('input', () => applyBlur(blurSlider.value));

  // Valores iniciales
  applyDarkness(darknessSlider.value);
  applyBlur(blurSlider.value);
})();

// ===== GLOBAL TOOLTIPS =====
(function initGlobalTooltips() {
  const SKIP_SELECTORS = '#toggleMsgGen, [data-no-tooltip]';

  function createTooltip(el, text) {
    const tip = document.createElement('div');
    tip.className = 'ui-tooltip';
    tip.textContent = text;
    tip.setAttribute('role', 'tooltip');
    tip.setAttribute('aria-hidden', 'true');

    // Append to body so it escapes any overflow:hidden container (panel, mode-toggle, etc.)
    document.body.appendChild(tip);

    // Remove native tooltip to avoid double tooltip
    el.dataset.titleBackup = el.getAttribute('title') || '';
    el.removeAttribute('title');

    function positionTip() {
      const r = el.getBoundingClientRect();
      // Center horizontally on element; translateX(-50%) in CSS handles the offset
      tip.style.left = (r.left + r.width / 2) + 'px';
      // Position above the element: estimate ~26px tooltip height + 8px gap
      tip.style.top = (r.top - 34) + 'px';
    }

    el.addEventListener('mouseenter', () => { positionTip(); tip.classList.add('visible'); });
    el.addEventListener('mouseleave', () => tip.classList.remove('visible'));
    el.addEventListener('focusin',    () => { positionTip(); tip.classList.add('visible'); });
    el.addEventListener('focusout',   () => tip.classList.remove('visible'));
  }

  // Wait for DOM to be fully painted
  requestAnimationFrame(() => {
    document.querySelectorAll('[title]').forEach(el => {
      if (el.closest(SKIP_SELECTORS)) return;
      if (el.querySelector('.toggle-tooltip, .ui-tooltip')) return;
      const text = el.getAttribute('title');
      if (!text || !text.trim()) return;
      createTooltip(el, text.trim());
    });
  });
})();

// ===== DYNAMIC FADE FOR #resultsArea BASED ON SCROLL POSITION =====
(function initResultsAreaFade() {
  const area = document.getElementById('resultsArea');
  if (!area) return;

  function updateFade() {
    const atTop = area.scrollTop <= 2;
    const atBottom = area.scrollTop + area.clientHeight >= area.scrollHeight - 2;

    let mask;
    if (atTop && atBottom) {
      mask = 'none';
    } else if (atTop) {
      mask = 'linear-gradient(to bottom, black 0%, black calc(100% - 52px), transparent 100%)';
    } else if (atBottom) {
      mask = 'linear-gradient(to bottom, transparent 0px, black 52px, black 100%)';
    } else {
      mask = 'linear-gradient(to bottom, transparent 0px, black 52px, black calc(100% - 52px), transparent 100%)';
    }
    area.style.maskImage = mask;
    area.style.webkitMaskImage = mask;
  }

  area.addEventListener('scroll', updateFade, { passive: true });
  window.addEventListener('load', updateFade);
  window._updateResultsFade = updateFade;
})();

// ===== STAR LOGO: Giro continuo por mitades (nunca retrocede) =====
(function initStarLogoRotation() {
  const logo = document.getElementById('brandLogo');
  if (!logo) return;
  let totalRot = 0;
  logo.parentElement.addEventListener('mouseenter', () => {
    totalRot += 180;
    logo.style.transform = `rotate(${totalRot}deg)`;
  });
  logo.parentElement.addEventListener('mouseleave', () => {
    totalRot += 180;
    logo.style.transform = `rotate(${totalRot}deg)`;
  });
})();

// ===== MENU SCROLL FADE =====
function initMenuScrollFade(scrollEl, wrapEl) {
  function update() {
    const atTop = scrollEl.scrollTop <= 4;
    const atBottom = scrollEl.scrollTop + scrollEl.clientHeight >= scrollEl.scrollHeight - 4;
    wrapEl.classList.remove('fade-top', 'fade-bottom-only', 'fade-top-only', 'fade-none');
    if (atTop && atBottom) {
      wrapEl.classList.add('fade-none');
    } else if (atTop) {
      wrapEl.classList.add('fade-bottom-only');
    } else if (atBottom) {
      wrapEl.classList.add('fade-top-only');
    } else {
      wrapEl.classList.add('fade-top');
    }
  }
  scrollEl.addEventListener('scroll', update, { passive: true });
  update();
}
